<dialog {% if open %}open{% endif %}>
    {% if form %}
    <article>
        <header>
            {{ voting_voter.voter.name }} (#{{ voting_voter.voter.member_id }}) bearbeiten
            <button aria-label="close" rel="prev" hx-on:click="htmx.find('dialog').close();"></button>
        </header>
        <form hx-post="{% url "voting:voter-edit" voting_id=voting.id voting_voter_id=voting_voter.id %}" hx-target="closest dialog" hx-swap="outerHTML">
            {% csrf_token %}
            {{ form.as_div }}
            <div role="group" hx-boost="true">
                <a role="button" class="secondary"
                   href="{% url "voting:voters" voting_id=voting.id %}"
                   hx-target="closest dialog"
                   hx-swap="outerHTML">Zurück</a>
                <button type="submit">Speichern</button>
            </div>
        </form>
    </article>
    {% endif %}
</dialog>
