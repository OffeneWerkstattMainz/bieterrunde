[tasks.dev]
description = "Run a local dev server"
run = "uv run python manage.py runserver 0.0.0.0:8080"

[tasks.tests]
description = "Run tests"
usage = '''
flag "--lf" "Run only the tests that failed in the last run"
flag "--last-failed" "Run only the tests that failed in the last run"
'''
run = "uv run pytest ${usage_last_failed:+--lf}${usage_lf:+--lf}"

[tasks.build-docker]
description = "Build the docker image"
run = "docker build -f docker/Dockerfile -t bieterrunde ."

[tasks.djshell]
description = "Start a django python shell"
run = "uv run python manage.py shell"

[tasks.djm]
description = "Run a django manage.py command"
run = "uv run python manage.py {{arg(name='commmands', var=true)}}"

[tools]
prek = "0.3.8"
python = "3.12"
uv = "0.11.6"

[env]
DJANGO_SETTINGS_MODULE = "bieterrunde.settings_dev"
